<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<nav> Helping Hands - Find Trusted House Help</nav>


<div class="container">

    <!-- LEFT SIDE -->
   

    <!-- RIGHT SIDE -->
    <div class="right">

    <div class="form-box">

        <h2>Welcome </h2>
        <p class="small-text">Login or create your account</p>

        <input type="email" id="email" placeholder="Enter Email">
        <input type="password" id="password" placeholder="Enter Password">

        <select id="role">
            <option value="user">User</option>
            <option value="helper">House Help</option>
        </select>

        <div class="btns">
            <button onclick="register()">Register</button>
            <button class="login" onclick="login()">Login</button>
        </div>

        <p class="forgot" onclick="forgotPassword()">Forgot Password?</p>

    </div>

</div>

</div>



<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getAuth } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
   import { getDatabase } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBaXgba7USs10Sind-b4ilrmrTp1qJGsB0",
    authDomain: "house-help-project.firebaseapp.com",
    databaseURL: "https://house-help-project-default-rtdb.firebaseio.com/",
    projectId: "house-help-project"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  
  window.auth = auth;
  window.db = db;
</script>
<script src="./app.js"></script>
</body>
</html>
